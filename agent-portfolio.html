<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayo Daniel — Real Estate Consultant, Lagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HOW TO ADD A NEW LISTING
   Scroll to the LISTINGS array near the bottom of the <script>
   tag and add one object to the array. Cards, filters and counts
   update automatically. You should never need to touch the CSS
   or HTML to add, remove, or mark a property as sold.
   ============================================================ */

:root{
  --paper:#FAF8F5;
  --ink:#1B1B1F;
  --stone:#7A7468;
  --line:#E4DFD6;
  --white:#FFFFFF;
  --accent:#B5533C;
  --accent-soft:#F1DED6;
  --radius:2px;
  --shadow: 0 12px 32px rgba(27,27,31,0.10);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper);
  line-height:1.5; -webkit-font-smoothing:antialiased;
}
img{display:block; max-width:100%;}
h1,h2,h3{font-family:'Fraunces',serif; font-weight:600; line-height:1.1;}
.eyebrow{font-size:0.72rem; letter-spacing:0.1em; color:var(--stone); font-weight:600; text-transform:uppercase;}
.wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}

/* ---- Nav ---- */
.nav{position:sticky; top:0; z-index:50; background:rgba(250,248,245,0.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--line);}
.nav .wrap{display:flex; align-items:center; justify-content:space-between; padding:16px 24px;}
.nav-brand{font-family:'Fraunces',serif; font-weight:600; font-size:1.1rem;}
.nav-brand span{color:var(--accent);}
.nav-cta{background:var(--accent); color:var(--white); border:none; padding:10px 18px; border-radius:var(--radius); font-size:0.82rem; font-weight:600;}

/* ---- Hero: agent value prop, not a property ---- */
.hero{padding:76px 0 56px; border-bottom:1px solid var(--line);}
.hero-grid{display:grid; grid-template-columns:1.2fr 0.8fr; gap:48px; align-items:end;}
.hero h1{font-size:clamp(2.1rem, 4.5vw, 3.1rem); max-width:16ch; margin-top:12px;}
.hero p{color:#4A473F; max-width:44ch; margin-top:16px; font-size:1.02rem;}
.stat-row{display:flex; gap:36px; margin-top:28px;}
.stat .num{font-family:'Fraunces',serif; font-size:1.9rem; font-weight:600; color:var(--accent);}
.stat .lbl{font-size:0.76rem; color:var(--stone); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px;}
.hero-photo{border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
.hero-photo img{width:100%; height:340px; object-fit:cover;}
@media (max-width:820px){.hero-grid{grid-template-columns:1fr;} .hero-photo img{height:220px;}}

/* ---- Listings ---- */
.listings{padding:60px 0;}
.listings-head{display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:28px; flex-wrap:wrap;}
.filter-row{display:flex; gap:8px; flex-wrap:wrap;}
.filter-btn{
  border:1px solid var(--line); background:var(--white); padding:8px 16px; border-radius:999px;
  font-size:0.8rem; font-weight:600; color:var(--stone);
}
.filter-btn.active{background:var(--ink); color:var(--white); border-color:var(--ink);}
.result-count{font-size:0.82rem; color:var(--stone);}

.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
@media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:640px){.grid{grid-template-columns:1fr;}}

.card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; transition:transform .18s ease, box-shadow .18s ease;}
.card:hover{transform:translateY(-3px); box-shadow:var(--shadow);}
.card-media{position:relative; height:200px;}
.card-media img{width:100%; height:100%; object-fit:cover;}
.card-badge{
  position:absolute; top:12px; left:12px; background:var(--white); color:var(--ink);
  font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
  padding:5px 10px; border-radius:2px;
}
.card-badge.sold{background:var(--ink); color:var(--white);}
.card-body{padding:18px;}
.card-price{font-family:'Fraunces',serif; font-size:1.3rem; font-weight:600; color:var(--accent);}
.card-title{font-size:0.98rem; font-weight:700; margin-top:4px;}
.card-loc{font-size:0.82rem; color:var(--stone); margin-top:2px;}
.card-specs{display:flex; gap:14px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); font-size:0.8rem; color:#4A473F;}
.card-cta{
  margin-top:14px; width:100%; background:var(--paper); border:1px solid var(--line);
  padding:9px; border-radius:var(--radius); font-size:0.82rem; font-weight:600;
}
.card-cta:hover{background:var(--accent-soft); border-color:var(--accent);}
.empty-state{text-align:center; padding:60px 20px; color:var(--stone); font-size:0.92rem; display:none;}

/* ---- Detail modal ---- */
.modal-overlay{position:fixed; inset:0; background:rgba(15,14,11,0.72); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:40px 20px; overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{
    background:var(--white);
  max-width:720px;
  width:100%;
  border-radius:var(--radius);
  overflow:hidden;
  position:relative;   /* add this line */
  }
.modal-img{height:320px;}
.modal-img img{width:100%; height:100%; object-fit:cover;}
.modal-body{padding:28px;}
.modal-close{
    position:absolute;
  top:14px;
  right:14px;
  z-index:5;
  background:rgba(0,0,0,0.55);
  color:var(--white);
  border:none;
  border-radius:50%;
  width:34px;
  height:34px;
  font-size:1.2rem;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
    }
.modal-price{font-family:'Fraunces',serif; font-size:1.6rem; color:var(--accent); font-weight:600;}
.modal-specs{display:flex; gap:22px; margin:14px 0; flex-wrap:wrap;}
.modal-specs div{font-size:0.82rem; color:var(--stone);}
.modal-specs strong{display:block; color:var(--ink); font-size:1rem;}
.modal-desc{color:#4A473F; font-size:0.92rem; margin:14px 0 20px;}
.modal-actions{display:flex; gap:10px;}
.modal-actions button{flex:1; padding:12px; border-radius:var(--radius); font-weight:700; font-size:0.85rem;}
.btn-wa{background:#25D366; color:white; border:none;}
.btn-secondary{background:var(--paper); border:1px solid var(--line);}


/* ---- Trust section ---- */
.trust{background:var(--ink); color:var(--white); padding:60px 0;}
.trust .eyebrow{color:rgba(255,255,255,0.5);}
.trust h2{color:var(--white); font-size:1.7rem; margin-top:8px; max-width:20ch;}
.trust-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:32px;}
.trust-item{background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:var(--radius); padding:22px;}
.trust-item .num{font-family:'Fraunces',serif; font-size:1.6rem; color:var(--accent); font-weight:600;}
.trust-item .lbl{font-size:0.82rem; color:rgba(255,255,255,0.75); margin-top:6px;}
@media (max-width:700px){.trust-grid{grid-template-columns:1fr;}}

/* ---- Contact ---- */
.contact{padding:64px 0;}
.contact-grid{display:grid; grid-template-columns:1fr 1fr; gap:48px;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;}
.form-row.full{grid-template-columns:1fr;}
input[type="text"], input[type="tel"], select, textarea{
  width:100%; padding:12px 14px; border-radius:var(--radius); border:1px solid var(--line);
  background:var(--white); font-family:inherit; font-size:0.92rem;
}
textarea{resize:vertical; min-height:90px;}
.submit-btn{background:var(--accent); color:var(--white); border:none; padding:13px 22px; border-radius:var(--radius); font-weight:700; font-size:0.9rem; width:100%;}
.contact-info{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:26px;}
.contact-info .agent-name{font-size:1.1rem; font-weight:700; font-family:'Fraunces',serif;}
.contact-info .agent-role{color:var(--stone); font-size:0.85rem; margin-top:2px;}
.contact-info .row{display:flex; gap:10px; align-items:center; margin-top:16px; font-size:0.88rem;}
@media (max-width:820px){.contact-grid{grid-template-columns:1fr;}}

footer{padding:24px 0 36px; text-align:center; font-size:0.76rem; color:var(--stone); border-top:1px solid var(--line);}

.wa-float{
  position:fixed; bottom:20px; right:20px; z-index:55; background:#25D366; color:white; border:none;
  border-radius:999px; width:56px; height:56px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}
.wa-float svg{width:26px; height:26px;}

@media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <div class="nav-brand" id="nav-brand">Agent<span>.</span></div>
    <button class="nav-cta" onclick="scrollToId('listings')">View listings</button>
  </div>
</nav>

<section class="hero">
  <div class="wrap hero-grid">
    <div>
      <span class="eyebrow" id="hero-eyebrow"></span>
      <h1 id="hero-headline"></h1>
      <p id="hero-sub"></p>
      <div class="stat-row" id="hero-stats"></div>
    </div>
    <div class="hero-photo"><img id="hero-photo" src="" alt=""></div>
  </div>
</section>

<section class="listings" id="listings">
  <div class="wrap">
    <div class="listings-head">
      <div>
        <span class="eyebrow">Current listings</span>
        <h2 style="margin-top:6px; font-size:1.6rem;">Properties I'm currently handling</h2>
      </div>
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="result-count" id="result-count" style="margin-bottom:16px;"></div>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty-state">No properties match this filter yet — check back soon or ask directly below.</div>
  </div>
</section>

<section class="trust">
  <div class="wrap">
    <span class="eyebrow">Why work with me</span>
    <h2 id="trust-headline"></h2>
    <div class="trust-grid" id="trust-grid"></div>
  </div>
</section>

<section class="contact" id="contact">
  <div class="wrap">
    <div class="listings-head" style="margin-bottom:24px;">
      <div>
        <span class="eyebrow">Get in touch</span>
        <h2 style="margin-top:6px; font-size:1.6rem;">Tell me what you're looking for</h2>
      </div>
    </div>
    <div class="contact-grid">
      <form id="inquiryForm" onsubmit="return sendInquiry(event)">
        <div class="form-row">
          <input type="text" id="fName" placeholder="Full name" required>
          <input type="tel" id="fPhone" placeholder="Phone number" required>
        </div>
        <div class="form-row full">
          <select id="fInterest"><option value="">I'm interested in...</option></select>
        </div>
        <div class="form-row full">
          <input type="text" id="fBudget" placeholder="Budget range (optional)">
        </div>
        <div class="form-row full">
          <textarea id="fMessage" placeholder="What are you looking for? (location, size, timeline...)"></textarea>
        </div>
        <button type="submit" class="submit-btn">Send via WhatsApp</button>
      </form>
      <div class="contact-info">
        <div class="agent-name" id="ci-name"></div>
        <div class="agent-role" id="ci-role"></div>
        <div class="row" id="ci-phone"></div>
        <div class="row" id="ci-areas"></div>
      </div>
    </div>
  </div>
</section>

<footer id="footer-credit"></footer>

<button class="wa-float" onclick="waLink('Hi, I found your listings page and would like to talk.')" aria-label="Chat on WhatsApp">
  <svg viewBox="0 0 32 32" fill="white"><path d="M16.001 3C9.107 3 3.5 8.607 3.5 15.5c0 2.36.653 4.566 1.789 6.452L3 29l7.226-2.246A12.44 12.44 0 0 0 16.001 28C22.895 28 28.5 22.393 28.5 15.5S22.895 3 16.001 3zm0 22.7a10.14 10.14 0 0 1-5.17-1.417l-.371-.22-3.83 1.191 1.219-3.727-.242-.383a10.16 10.16 0 0 1-1.607-5.444c0-5.633 4.584-10.2 10.2-10.2 5.633 0 10.2 4.584 10.2 10.2 0 5.633-4.567 10.2-10.199 10.2zm5.59-7.64c-.306-.153-1.81-.892-2.09-.994-.28-.102-.484-.153-.688.153-.204.306-.79.994-.968 1.198-.178.204-.357.23-.663.077-.306-.153-1.292-.476-2.462-1.52-.91-.812-1.524-1.815-1.702-2.121-.178-.306-.019-.472.134-.624.138-.137.306-.357.459-.535.153-.178.204-.306.306-.51.102-.204.051-.383-.026-.535-.077-.153-.688-1.658-.943-2.271-.248-.596-.5-.515-.688-.524-.178-.009-.382-.011-.586-.011-.204 0-.535.077-.815.383-.28.306-1.070 1.045-1.070 2.55 0 1.505 1.096 2.96 1.249 3.164.153.204 2.157 3.294 5.228 4.62.73.315 1.3.503 1.744.644.733.233 1.4.2 1.928.121.588-.088 1.81-.740 2.065-1.454.255-.714.255-1.326.178-1.454-.076-.128-.28-.204-.586-.357z"/></svg>
</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-img"><img id="modal-img" src="" alt=""></div>
    <div class="modal-body">
      <div class="modal-price" id="modal-price"></div>
      <h3 id="modal-title"></h3>
      <div style="color:var(--stone); font-size:0.88rem; margin-top:4px;" id="modal-loc"></div>
      <div class="modal-specs" id="modal-specs"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-actions">
        <button class="btn-wa" id="modal-wa">Ask on WhatsApp</button>
        <button class="btn-secondary" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   AGENT PROFILE — edit once, applies everywhere
   ============================================================ */
const AGENT = {
  name: "Ayo Daniel",
  role: "Real Estate Consultant, Lagos",
  phone: "2348012345678",
  headline: "Lagos property, handled properly",
  sub: "I help buyers and families find homes across Lekki, Ikoyi, Ajah and Ibadan — from first viewing to keys in hand. No games, no ghosting.",
  heroPhoto: "https://picsum.photos/seed/agent-hero/700/700",
  yearsActive: 6,
  dealsClosed: 84,
  areasCovered: ["Lekki", "Ikoyi", "Ajah", "Bodija"]
};

/* ============================================================
   HOW TO ADD A NEW LISTING
   Add one object below. `status` controls the badge shown on
   the card: "For Sale", "New", or "Sold".
   ============================================================ */
const LISTINGS = [
  {
    id: "osapa-terrace",
    title: "4-Bedroom Terrace Duplex",
    location: "Osapa London, Lekki",
    status: "For Sale",
    price: 185000000,
    beds: 4, baths: 5, sqft: "2,600 sqft",
    image: "images/4bedroom-terrace-duplex.jpg",
    description: "Recently completed terrace duplex on a gated street, 5 minutes from the Lekki–Epe Expressway. All bedrooms en-suite, fitted kitchen, staff room, parking for four cars."
  },
  {
    id: "ikoyi-penthouse",
    title: "3-Bedroom Waterfront Penthouse",
    location: "Banana Island, Ikoyi",
    status: "New",
    price: 620000000,
    beds: 3, baths: 4, sqft: "3,100 sqft",
    image: "images/AnotherHouse4.jpg",
    description: "Full-floor penthouse with lagoon views, private elevator lobby, and access to the estate's pool, gym and 24-hour marine security."
  },
  {
    id: "ajah-bungalow",
    title: "3-Bedroom Detached Bungalow",
    location: "Sangotedo, Ajah",
    status: "For Sale",
    price: 68000000,
    beds: 3, baths: 3, sqft: "1,750 sqft",
    image: "images/AnotherHouse3.jpg",
    description: "Family bungalow on a fenced 500sqm plot with room to extend. Close to the Abraham Adesanya roundabout and Lekki Free Trade Zone commute."
  },
  {
    id: "bodija-duplex",
    title: "5-Bedroom Semi-Detached Duplex",
    location: "Bodija, Ibadan",
    status: "For Sale",
    price: 95000000,
    beds: 5, baths: 6, sqft: "3,400 sqft",
    image: "images/AnotherHouse.jpg",
    description: "Spacious family duplex in a long-established Bodija close, near UI and the Bodija market axis. BQ included, tarred street, mature trees."
  },
  {
    id: "lekki-studio",
    title: "Studio Apartment",
    location: "Chevron, Lekki",
    status: "Sold",
    price: 32000000,
    beds: 1, baths: 1, sqft: "620 sqft",
    image: "images/AnotherHouse5.jpg",
    description: "Compact serviced studio, ideal for a young professional. Sold within three weeks of listing — shown here as a recent track record example."
  },
  {
    id: "vgc-4bed",
    title: "4-Bedroom Detached House",
    location: "VGC, Lekki",
    status: "For Sale",
    price: 210000000,
    beds: 4, baths: 5, sqft: "2,900 sqft",
    image: "images/AnotherHouse2.jpg",
    description: "Detached house in a mature, well-planted VGC close. Large compound, boys' quarters, and generator house already fitted."
  }
];

function money(n){ return '₦' + Math.round(n).toLocaleString('en-NG'); }

let activeFilter = "All";

function uniqueLocationTags(){
  const tags = LISTINGS.map(l => l.location.split(',').pop().trim());
  return ["All", ...Array.from(new Set(tags))];
}

function renderHero(){
  document.getElementById('nav-brand').innerHTML = AGENT.name + '<span>.</span>';
  document.getElementById('hero-eyebrow').textContent = AGENT.role;
  document.getElementById('hero-headline').textContent = AGENT.headline;
  document.getElementById('hero-sub').textContent = AGENT.sub;
  document.getElementById('hero-photo').src = AGENT.heroPhoto;
  document.getElementById('hero-stats').innerHTML = `
    <div class="stat"><div class="num">${AGENT.yearsActive}+</div><div class="lbl">Years active</div></div>
    <div class="stat"><div class="num">${AGENT.dealsClosed}</div><div class="lbl">Deals closed</div></div>
    <div class="stat"><div class="num">${AGENT.areasCovered.length}</div><div class="lbl">Areas covered</div></div>
  `;
  document.getElementById('trust-headline').textContent = `Buyers work with me because the process doesn't fall apart after the viewing.`;
  document.getElementById('trust-grid').innerHTML = `
    <div class="trust-item"><div class="num">${AGENT.yearsActive}+ yrs</div><div class="lbl">Active in ${AGENT.areasCovered.join(', ')}</div></div>
    <div class="trust-item"><div class="num">${AGENT.dealsClosed}</div><div class="lbl">Verified closings, references on request</div></div>
    <div class="trust-item"><div class="num">24–48h</div><div class="lbl">Typical response time on inquiries</div></div>
  `;
  document.getElementById('ci-name').textContent = AGENT.name;
  document.getElementById('ci-role').textContent = AGENT.role;
  document.getElementById('ci-phone').innerHTML = `&#128222; ${AGENT.phone.replace('234','+234 ')}`;
  document.getElementById('ci-areas').innerHTML = `&#128205; Covers ${AGENT.areasCovered.join(', ')}`;
  document.getElementById('footer-credit').textContent = `${AGENT.name} · ${AGENT.role} · Listings updated regularly`;

  const sel = document.getElementById('fInterest');
  LISTINGS.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l.title + ' — ' + l.location;
    opt.textContent = l.title + ' — ' + l.location;
    sel.appendChild(opt);
  });
  const generalOpt = document.createElement('option');
  generalOpt.value = "Something not listed yet";
  generalOpt.textContent = "Something not listed yet";
  sel.appendChild(generalOpt);
}

function renderFilters(){
  const tags = uniqueLocationTags();
  document.getElementById('filter-row').innerHTML = tags.map(t =>
    `<button class="filter-btn ${t==='All' ? 'active':''}" onclick="setFilter('${t}')">${t}</button>`
  ).join('');
}

function setFilter(tag){
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === tag);
  });
  renderGrid();
}

function renderGrid(){
  const filtered = activeFilter === "All"
    ? LISTINGS
    : LISTINGS.filter(l => l.location.includes(activeFilter));

  document.getElementById('result-count').textContent =
    `${filtered.length} propert${filtered.length===1?'y':'ies'} ${activeFilter==='All' ? '' : 'in ' + activeFilter}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-state');

  if(filtered.length === 0){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(l => `
    <div class="card">
      <div class="card-media">
        <img src="${l.image}" alt="${l.title}">
        <span class="card-badge ${l.status==='Sold' ? 'sold':''}">${l.status}</span>
      </div>
      <div class="card-body">
        <div class="card-price">${money(l.price)}</div>
        <div class="card-title">${l.title}</div>
        <div class="card-loc">&#128205; ${l.location}</div>
        <div class="card-specs">
          <span>${l.beds} bed</span><span>${l.baths} bath</span><span>${l.sqft}</span>
        </div>
        <button class="card-cta" onclick="openModal('${l.id}')">View details</button>
      </div>
    </div>
  `).join('');
}

function openModal(id){
  const l = LISTINGS.find(x => x.id === id);
  document.getElementById('modal-img').src = l.image;
  document.getElementById('modal-price').textContent = money(l.price);
  document.getElementById('modal-title').textContent = l.title;
  document.getElementById('modal-loc').textContent = l.location;
  document.getElementById('modal-specs').innerHTML = `
    <div><strong>${l.beds}</strong>Bedrooms</div>
    <div><strong>${l.baths}</strong>Bathrooms</div>
    <div><strong>${l.sqft}</strong>Floor area</div>
    <div><strong>${l.status}</strong>Status</div>
  `;
  document.getElementById('modal-desc').textContent = l.description;
  document.getElementById('modal-wa').onclick = () => waLink(`Hi ${AGENT.name}, I'd like to know more about the ${l.title} in ${l.location} (${money(l.price)}).`);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

function scrollToId(id){ document.getElementById(id).scrollIntoView({behavior:'smooth'}); }

function waLink(message){
  window.open(`https://wa.me/${AGENT.phone}?text=${encodeURIComponent(message)}`, '_blank');
}

function sendInquiry(e){
  e.preventDefault();
  const name = document.getElementById('fName').value;
  const phone = document.getElementById('fPhone').value;
  const interest = document.getElementById('fInterest').value;
  const budget = document.getElementById('fBudget').value;
  const msg = document.getElementById('fMessage').value;
  let text = `Hi ${AGENT.name}, I'm ${name} (${phone}).`;
  if(interest) text += ` I'm interested in: ${interest}.`;
  if(budget) text += ` Budget: ${budget}.`;
  if(msg) text += ` ${msg}`;
  waLink(text);
  return false;
}

renderHero();
renderFilters();
renderGrid();
</script>
